policy_metadata:
  created_on: "2026-03-25"
  purpose: "Benchmark-driven source portfolio shortlist for historical and realtime municipal-election coverage."
  decision_principle:
    - "Do not onboard every outlet into production at once."
    - "Use benchmark evidence to classify each source before engineering a connector."
    - "Treat RSS feeds as realtime monitors unless proven historical-capable."
    - "Prefer sources that can retrieve candidate-level local coverage, not just national political headlines."

provider_policy:
  - source_key: "gnews"
    source_type: "aggregator_api"
    recommended_role: "production_primary_recent"
    benchmark_priority: "wave_0"
    historical_capability: "last_30_days_free"
    request_budget: "100_requests_per_day_free"
    next_action: "Keep as the default production ingest source for recent coverage."
    why: "Currently the only benchmarked source that returns stable candidate-level hits with successful full-text extraction."
  - source_key: "gdelt"
    source_type: "aggregator_api"
    recommended_role: "historical_backfill_secondary"
    benchmark_priority: "wave_0"
    historical_capability: "multi_month_backfill_but_rate_limited"
    request_budget: "low_frequency_only"
    next_action: "Run as a separate low-frequency backfill job, not in the default benchmark path."
    why: "Useful for older historical windows, but the public API is operationally noisy and should not dominate the main benchmark."

role_definitions:
  production_candidate: "Worth connector work after benchmark validation; can graduate into the stable ingest path."
  realtime_only: "Useful for near-real-time monitoring but not reliable for historical replay."
  truth_only: "Useful for manual truth curation or qualitative review, but not a good free automated full-text source."
  benchmark_first: "Worth testing in the next benchmark wave before production commitment."
  discard_for_now: "Do not spend engineering time until access or value changes."

